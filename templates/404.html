<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — FootieStat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:         #f4f4f0;
      --surface:    #ffffff;
      --border:     #e2e2dc;
      --text:       #1a1a18;
      --text-muted: #6b6b65;
      --green:      #1a4731;
      --green-dim:  #2d6b4a;
      --font-head:  'Bebas Neue', sans-serif;
      --font-body:  'DM Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .error-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .error-code {
      font-family: var(--font-head);
      font-size: 96px;
      line-height: 1;
      color: var(--green);
      letter-spacing: .04em;
      margin-bottom: 8px;
    }
    .error-title {
      font-family: var(--font-head);
      font-size: 22px;
      letter-spacing: .1em;
      color: var(--text);
      margin-bottom: 16px;
    }
    .error-msg {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .home-btn {
      display: inline-block;
      background: var(--green);
      color: #fff;
      font-family: var(--font-head);
      font-size: 14px;
      letter-spacing: .14em;
      padding: 12px 32px;
      border-radius: 3px;
      text-decoration: none;
    }
    .home-btn:hover { background: var(--green-dim); }
  </style>
</head>
<body>
  <div class="error-wrap">
    <div class="error-code">404</div>
    <div class="error-title">PAGE NOT FOUND</div>
    <p class="error-msg">
      The fixture or page you're looking for doesn't exist.<br>
      It may have been removed or the link is incorrect.
    </p>
    <a href="/" class="home-btn">BACK TO FIXTURES</a>
  </div>
</body>
</html>
